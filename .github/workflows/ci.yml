name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, with clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      # Scope to the crates that build without the Node/Python toolchains.
      # scrt-napi / scrt-py are out of default-members and need extra setup;
      # they're exercised by the release build, not the CI gate.
      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy -p scrt-core -p scrt-cli -p scrt-server -p scrt-evolve --all-targets

      - name: Test
        run: cargo test -p scrt-core -p scrt-cli -p scrt-server -p scrt-evolve
